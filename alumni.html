  <script type="module">
  import { firebaseConfig, firebaseImports } from './js/firebase.js';
  import { initials } from './js/util.js';

  async function main(){
    // Firebase imports
    const appMod = await import(firebaseImports.app);
    const authMod = await import(firebaseImports.auth);
    const {
      getFirestore, doc, getDoc, setDoc, addDoc, collection,
      getDocs, query, where, orderBy, deleteDoc, serverTimestamp
    } = await import(firebaseImports.firestore);

    // Init Firebase
    const app = appMod.initializeApp(firebaseConfig);
    const auth = authMod.getAuth(app);
    const db = getFirestore(app);   // ✅ yaha fs.getFirestore nahi, direct getFirestore use karna

    let currentUser = null, userDocData = null;

    // Logout
    document.getElementById('logout').onclick = async ()=>{
      await authMod.signOut(auth);
      location.href = 'auth.html';
    };

    // Auth state
    authMod.onAuthStateChanged(auth, async (u)=>{
      if(!u){ location.href='auth.html'; return; }
      currentUser = u;
      document.getElementById('email').value = u.email || '';

      // fetch user doc
      const docRef = doc(db,'users',u.uid);   // ✅ fs.doc hata diya
      const snap = await getDoc(docRef);
      if(!snap.exists()){ alert('No profile found'); return; }
      userDocData = snap.data();

      if(userDocData.role !== 'alumni'){
        alert('Not an alumni account');
        location.href='student.html';
        return;
      }

      // fill profile
      document.getElementById('name').value = userDocData.name||'';
      document.getElementById('branch').value = userDocData.branch||'';
      document.getElementById('gradYear').value = userDocData.gradYear||'';
      document.getElementById('bio').value = userDocData.bio||'';
      document.getElementById('verifyStatus').textContent = 
        userDocData.verified ? 'Verified ✅' : 'Pending verification ⏳';

      loadMyPosts();
    });

    // Save profile
    document.getElementById('saveProfile').onclick = async ()=>{
      const docRef = doc(db,'users',currentUser.uid);
      await setDoc(docRef, {
        name: document.getElementById('name').value,
        branch: document.getElementById('branch').value,
        gradYear: parseInt(document.getElementById('gradYear').value) || null,
        bio: document.getElementById('bio').value
      }, {merge:true});
      alert('Profile saved');
    };

    // Post experience
    document.getElementById('postExp').onclick = async ()=>{
      if(!userDocData?.verified) 
        return alert('Wait until admin verifies your alumni profile.');

      const title = document.getElementById('expTitle').value.trim();
      const company = document.getElementById('expCompany').value.trim();
      const content = document.getElementById('expContent').value.trim();
      const tags = document.getElementById('expTags').value.trim();
      if(!title || !content) return alert('Title & content required');

      await addDoc(collection(db,'experiences'), {   // ✅ fs.collection hata diya
        title, company, content, tags,
        authorId: currentUser.uid,
        authorName: userDocData.name || (currentUser.email||'').split('@')[0],
        approved: false,
        createdAt: serverTimestamp()   // ✅ ab timestamp properly save hoga
      });
      alert('Submitted for approval');

      // reset form
      document.getElementById('expTitle').value='';
      document.getElementById('expCompany').value='';
      document.getElementById('expContent').value='';
      document.getElementById('expTags').value='';

      loadMyPosts();
    };

    // Load user's posts
    async function loadMyPosts(){
      const list = document.getElementById('myPosts');
      list.innerHTML = '';
      const snap = await getDocs(
        query(
          collection(db,'experiences'), 
          where('authorId','==', currentUser.uid),
          // orderBy('createdAt','desc')
        )
      );
      snap.forEach(docSnap=>{
        const d = docSnap.data();
        const el = document.createElement('div');
        el.className='item';
        el.innerHTML = `
          <div class="avatar">${initials(d.authorName||'A')}</div>
          <div>
            <div><strong>${d.title}</strong></div>
            <div class="muted">${d.company||'—'} • ${d.approved?'Approved ✅':'Pending ⏳'}</div>
            <div style="margin-top:6px">${(d.content||'').slice(0,140)}...</div>
          </div>
          <div>${d.approved ? '' : '<button class="btn ghost" data-id="'+docSnap.id+'">Delete</button>'}</div>
        `;
        if(!d.approved){
          el.querySelector('button').onclick = async ()=>{
            await deleteDoc(doc(db,'experiences',docSnap.id));   // ✅ fs.deleteDoc hata diya
            loadMyPosts();
          };
        }
        list.appendChild(el);
      });
    }
  }

  main();
</script>

</body>
</html>
